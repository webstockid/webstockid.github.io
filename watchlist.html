			}

	<body class="text-slate-200 antialiased overflow-x-hidden">

				<div class="flex items-center gap-3">

						<i class="fa-solid fa-chart-line text-slate-950 text-xl font-black"></i>
					</div>
					<div>
						<span class="heading-font text-xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">STOCK ID <span class="text-emerald-400 font-bold">WATCHLIST</span>
						</span>
						<p class="text-[9px] font-mono tracking-widest text-emerald-400 uppercase">#Andaimology Edition</p>
					</div>
				</div>
				<div class="hidden md:flex items-center gap-8 text-sm font-medium text-slate-400">
					<a href="#benefit" class="hover:text-emerald-400 transition-colors">Benefit</a>
					<a href="#stats" class="hover:text-emerald-400 transition-colors">Statistik</a>
					<a href="#paket" class="hover:text-emerald-400 transition-colors">Paket Belajar</a>
					<a href="#faq" class="hover:text-emerald-400 transition-colors">FAQ</a>
				</div>
				<div>
					<a href="https://webstockid.github.io/index" class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-5 py-2.5 rounded-xl font-bold text-sm tracking-wide transition shadow-lg shadow-emerald-500/20 block">STOCK ID VIP</a>
				</div>
			</div>
		</nav>
		
		<div class="w-full max-w-7xl mx-auto px-4 py-6 text-gray-100">
			<div class="bg-gradient-to-r from-slate-900/60 to-slate-950/40 backdrop-blur-md border border-white/10 rounded-2xl p-5 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-xl shadow-emerald-950/5">
				<div class="flex items-center gap-3.5">
					<div class="p-2.5 bg-emerald-500/10 rounded-xl border border-emerald-500/20 text-emerald-400">
						<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
					</div>
					<div>
						<h2 class="text-base font-black tracking-wider uppercase text-gray-100 flex items-center gap-2">
							Stock ID Watchlist Harian
						</h2>
						<p class="text-[11px] text-gray-400">Arsip terstruktur rencana trading harian premium member</p>
					</div>
				</div>
				
				<div class="flex items-center gap-3 w-full sm:w-auto">
					<label for="pilihPeriodeBulan" class="text-xs font-bold text-gray-400 uppercase tracking-widest shrink-0">Periode:</label>
					<select id="pilihPeriodeBulan" onchange="muatUlangWatchlist()" class="w-full sm:w-52 bg-slate-950/90 border border-white/10 rounded-xl px-3 py-2.5 text-xs font-bold text-emerald-400 focus:outline-none focus:border-emerald-500 transition-all cursor-pointer shadow-inner"></select>
				</div>
			</div>
			
			<div id="rakWatchlistUtama" class="space-y-6"></div>
		</div>
		
<script>
	/* WATCHLIST */
	const DATABASE_WATCHLIST = [
		{
			tanggalISO: "2026-07-14",
			kategoriBulan: "2026-07",
			daftarSaham: [
				{ 
					nama: "DSSA", 
					status: "BUY", 
					support: "725", 
					entrySafe: "HAKA or 800 - 815", 
					takeProfit: "840 - 875", 
					stoploss: "775", 
					note: "" 
				},
				{ 
					nama: "ESSA", 
					status: "BUY", 
					support: "", 
					entrySafe: "570 - 580", 
					takeProfit: "590 - 600", 
					stoploss: "550", 
					note: "Hajar agak gedean, karna naiknya sedikit, ambil keuntungan dari modal gede." 
				},
				{ 
					nama: "DATA", 
					status: "BUY", 
					support: "", 
					entrySafe: "2,300 - 2,350", 
					takeProfit: "2,390 - 2,420", 
					stoploss: "2,330", 
					note: "" 
				},
				{ 
					nama: "BRPT", 
					status: "BUY", 
					support: "", 
					entrySafe: "1,660 - 1,690", 
					takeProfit: "1,800 - 1,880 or higger. ", 
					stoploss: "1,620", 
					note: "" 
				}
			]
		},
		/*{
			tanggalISO: "2026-07-13",
			kategoriBulan: "2026-07",
			daftarSaham: [
				{ 
					nama: "BMRI", 
					status: "BUY", 
					entrySafe: "6,100 - 6,175", 
					support: "6,000", 
					takeProfit: "6,400", 
					note: "Pantau jika mantul aman dari garis MA-20 harian untuk entri cicil bertahap." 
				}
			]
		}*/
	];

	/* ==========================================================================
	   LOGIKA ENGINE RENDER UI AUTOMATION
	   ========================================================================== */
	const KAMUS_BULAN = {
		"01": "Januari", "02": "Februari", "03": "Maret", "04": "April", "05": "Mei", "06": "Juni",
		"07": "Juli", "08": "Agustus", "09": "September", "10": "Oktober", "11": "November", "12": "Desember"
	};

	function inisialisasiPilihanPeriode() {
		const dropdown = document.getElementById('pilihPeriodeBulan');
		if (!dropdown) return;

		const daftarBulanUnik = [...new Set(DATABASE_WATCHLIST.map(d => d.kategoriBulan))].sort().reverse();
		
		dropdown.innerHTML = "";
		daftarBulanUnik.forEach(blnKey => {
			const [tahun, bln] = blnKey.split("-");
			const opsi = document.createElement('option');
			opsi.value = blnKey;
			opsi.textContent = `${KAMUS_BULAN[bln]} ${tahun}`;
			dropdown.appendChild(opsi);
		});

		if (daftarBulanUnik.length > 0) dropdown.value = daftarBulanUnik[0];
	}

	function ubahKeFormatTanggalLokal(stringTgl) {
		const [tahun, bulan, hari] = stringTgl.split("-");
		return `${hari} ${KAMUS_BULAN[bulan]} ${tahun}`;
	}

	function kendaliAksiAccordion(idPanel) {
		const panel = document.getElementById(idPanel);
		const panah = document.getElementById('panah-' + idPanel);
		if (!panel) return;

		if (panel.classList.contains('hidden')) {
			panel.classList.remove('hidden');
			if (panah) panah.style.transform = "rotate(180deg)";
		} else {
			panel.classList.add('hidden');
			if (panah) panah.style.transform = "rotate(0deg)";
		}
	}

	function muatUlangWatchlist() {
		const dropdown = document.getElementById('pilihPeriodeBulan');
		const rakKontainer = document.getElementById('rakWatchlistUtama');
		if (!dropdown || !rakKontainer) return;

		const bulanAktif = dropdown.value;
		rakKontainer.innerHTML = "";

		const filterData = DATABASE_WATCHLIST.filter(item => item.kategoriBulan === bulanAktif);

		if (filterData.length === 0) {
			rakKontainer.innerHTML = `<div class="text-center text-xs text-gray-500 py-16 border border-dashed border-white/10 rounded-2xl">Belum ada catatan watchlist untuk periode bulan ini.</div>`;
			return;
		}

		filterData.forEach((grupHari, indeks) => {
			const idUnikPanel = `grup-accordion-${indeks}`;
			const labelTanggal = ubahKeFormatTanggalLokal(grupHari.tanggalISO);

			const boxTanggal = document.createElement('div');
			boxTanggal.className = "bg-slate-900/20 border border-white/5 rounded-2xl overflow-hidden shadow-lg transition-all";

			boxTanggal.innerHTML = `
				<div onclick="kendaliAksiAccordion('${idUnikPanel}')" class="flex items-center justify-between p-4 bg-white/5 border-b border-white/5 cursor-pointer hover:bg-white/10 active:bg-white/5 transition-all select-none">
					<div class="flex items-center gap-3">
						<div class="w-1.5 h-6 bg-gradient-to-b from-emerald-400 to-emerald-600 rounded-full shadow-[0_0_8px_rgba(52,211,153,0.4)]"></div>
						<span class="text-xs font-black tracking-wider text-gray-200 uppercase">${labelTanggal}</span>
						<span class="text-[10px] font-bold bg-orange-500/10 text-orange-400 border border-orange-500/20 px-2 py-0.5 rounded-full">${grupHari.daftarSaham.length} Emiten Saham</span>
					</div>
					<svg id="panah-${idUnikPanel}" class="text-gray-400 transition-transform duration-300" style="transform: rotate(180deg);" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
				</div>
			`;

			const gridBox = document.createElement('div');
			gridBox.id = idUnikPanel;
			gridBox.className = "p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 transition-all";

			grupHari.daftarSaham.forEach(saham => {
				const teksNote = saham.note ? saham.note.trim() : "";
				
				const komponenNoteHtml = teksNote !== "" ? `
					<div class="bg-black/10 p-2.5 border border-white/5 rounded-xl text-[10px] text-gray-300 leading-relaxed mt-3">
						<span class="font-bold text-gray-400 block mb-0.5 uppercase tracking-wider text-[9px]">Note:</span>
						${teksNote}
					</div>
				` : "";

				// Cabang Logika Label Status (HIT atau BUY TARGET) beserta warnanya
				let labelStatusHtml = "";
				if (saham.status && saham.status.toUpperCase() === "HIT") {
					labelStatusHtml = `<span class="text-[9px] font-black bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded uppercase tracking-widest shadow-[0_0_10px_rgba(52,211,153,0.15)] animate-pulse">TARGET HIT</span>`;
				} else {
					labelStatusHtml = `<span class="text-[9px] font-black bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-0.5 rounded uppercase tracking-widest shadow-sm">BUY TARGET</span>`;
				}

				const balonChat = document.createElement('div');
				balonChat.className = "relative bg-gradient-to-br from-slate-900/70 to-slate-950/50 border border-white/10 rounded-2xl rounded-tl-none p-4 flex flex-col justify-between shadow-xl transition-all hover:border-emerald-500/30 group";
				
				balonChat.innerHTML = `
					<div class="absolute top-0 -left-2 w-0 h-0 border-t-[12px] border-t-slate-900/70 border-l-[8px] border-l-transparent"></div>
					
					<div>
						<div class="flex items-center justify-between border-b border-white/5 pb-2.5 mb-3">
							<div class="flex items-center gap-2">
								<a href="https://stockbit.com/symbol/${saham.nama.toUpperCase()}" target="_blank" rel="noopener noreferrer" class="text-base font-black font-mono text-green-400 hover:text-green-300 hover:underline transition-all tracking-wide flex items-center gap-1" title="Analisis ${saham.nama} di Stockbit">
									${saham.nama.toUpperCase()}
									<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="opacity-60 group-hover:opacity-100"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
								</a>
							</div>
							${labelStatusHtml}
						</div>

						<div class="space-y-1.5 text-[11px] font-medium">
							<div class="flex items-center justify-between bg-black/20 px-2.5 py-1.5 rounded-xl border border-white/5">
								<span class="text-white-400">Support:</span>
								<span class="font-bold font-mono text-amber-400 bg-amber-500/5 px-1.5 py-0.5 rounded border border-amber-500/10">${saham.support || "-"}</span>
							</div>
							<div class="flex items-center justify-between bg-black/20 px-2.5 py-1.5 rounded-xl border border-white/5">
								<span class="text-white-400">Entry Safe:</span>
								<span class="font-bold font-mono text-blue-400 bg-blue-500/5 px-1.5 py-0.5 rounded border border-blue-500/10">${saham.entrySafe || "-"}</span>
							</div>
							<div class="flex items-center justify-between bg-black/20 px-2.5 py-1.5 rounded-xl border border-white/5">
								<span class="text-white-400">Take Profit:</span>
								<span class="font-bold font-mono text-emerald-400 bg-emerald-500/5 px-1.5 py-0.5 rounded border border-emerald-500/10">${saham.takeProfit || "-"}</span>
							</div>
							<div class="flex items-center justify-between bg-black/20 px-2.5 py-1.5 rounded-xl border border-white/5">
								<span class="text-white-400">Stop Loss:</span>
								<span class="font-bold font-mono text-rose-400 bg-rose-500/5 px-1.5 py-0.5 rounded border border-rose-500/10">${saham.stoploss || "-"}</span>
							</div>
						</div>

						${komponenNoteHtml}
					</div>

					<div class="text-[8px] text-gray-500 text-right font-mono mt-3 pt-2 border-t border-white/5 tracking-wider uppercase">
						STOCK ID WATCHLIST
					</div>
				`;
				gridBox.appendChild(balonChat);
			});

			boxTanggal.appendChild(gridBox);
			rakKontainer.appendChild(boxTanggal);
		});
	}

	document.addEventListener("DOMContentLoaded", () => {
		inisialisasiPilihanPeriode();
		muatUlangWatchlist();
	});
</script>
</body>
</html>
