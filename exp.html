	<script type="text/javascript">
	function bukaReminderModal() {
		const select = document.getElementById("memberSelect");
		select.innerHTML = "";
		
		members.forEach((m, index) => {
			select.innerHTML += `<option value="${index}">${m.nama}</option>`;
		});
		document.getElementById("reminderModal").style.display = "flex";
	}
	
	function simpanReminder() {
		const index = document.getElementById("memberSelect").value;
		localStorage.setItem("reminderMember", index);
		document.getElementById("reminderModal").style.display = "none";
	}
	
	function cekReminder() {
		const index = localStorage.getItem("reminderMember");
		if (index === null) return;
		const m = members[index];
		if (!m || !m.expired) return;
		const today = new Date();
		const exp = new Date(m.expired);
		const diffTime = exp - today;
		const sisaHari = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
		const levels = [10, 5, 3];
		const sudahNotif = JSON.parse(localStorage.getItem("notifSent") || "{}");
		if (levels.includes(sisaHari) && !sudahNotif[sisaHari]) {
			Notification.requestPermission().then(permission => {
				if (permission === "granted") {
					new Notification(`Reminder ${m.nama}`, {
						body: `Masa aktif tersisa ${sisaHari} hari`
					});
				}
			});
			sudahNotif[sisaHari] = true;
			localStorage.setItem("notifSent", JSON.stringify(sudahNotif));
		}
	}
	
	window.addEventListener("load", () => {
		if (!localStorage.getItem("reminderMember")) {
			bukaReminderModal();
		}
		cekReminder();
	});
	</script>

	<script type="text/javascript">
	function hitungRekapKelas() {
		const rekap = {};
		members.forEach(m => {

			m.history.forEach(kelas => {
				rekap[kelas] = (rekap[kelas] || 0) + 1;
			});
		}
	});
	return rekap;

	<script type="text/javascript">
	function tambahMember() {
		const nama = prompt("Nama Member:");
		if(!nama) return;
		const whatsapp = prompt("Nomor WhatsApp:");
		if(!whatsapp) return;

	<script type="text/javascript">
	function editMember(index) {
		const m = members[index];
		const nama = prompt("Edit Nama:", m.nama);
		if(!nama) return;
		const whatsapp = prompt("Edit WhatsApp:", m.whatsapp);
		if(!whatsapp) return;
		const expired = prompt("Edit Expired (YYYY-MM-DD):", m.expired);
		if(!expired) return;

		m.whatsapp = whatsapp;
		m.expired = expired;
		alert("Data member berhasil diupdate 🦜");
		render();
	}
	</script>
	
	<script type="text/javascript">
	const DAY=86400000,HOUR=3600000,MIN=60000,SEC=1000;
	const lastMonth=m=>m.history.at(-1)||0;
	const target=d=>new Date(d+"T00:00:00").getTime();
	
	/* ================= FORMAT ================= */
	function sisa(ms) {
		if (ms<=0) return "Expired";
		const h=Math.floor(ms/DAY);
		const j=Math.floor(ms%DAY/HOUR);
		const m=Math.floor(ms%HOUR/MIN);
		const d=Math.floor(ms%MIN/SEC);
		return `${h} Hari ${j} Jam ${m} Menit ${d} Detik`;
	}
	
	function kelas(b,ms) {
		if (ms<=0) return "expired";
		if (b==1) return "satu";
		if (b==2) return "dua";
		if (b==3) return "tiga";
		if (b==6) return "enam";
		if (b==12) return "setahun";
	}
	
	function badge(arr) {
		if (arr.length==1) return `+${arr[0]} bulan`;
		return `+${arr.slice(0,-1).join(", ")} & ${arr.at(-1)} bulan`;
	}
	
	function join(arr) {
		return arr.map(b=>`${b} Bulan`).join(" + ");
	}
	
	/* ================= STAT ================= */
	function renderStat(data) {
		const box=document.getElementById("statistik");
		box.innerHTML="";
		const map={1:0,2:0,3:0,6:0,12:0,x:0};
		data.forEach(m=> {
			if (m.ms<=0) map.x++;
			else map[lastMonth(m)]++;
		});
		
		const rows=[
			[1,"1 Bulan","b1"],
			[2,"2 Bulan","b2"],
			[3,"3 Bulan","b3"],
			[6,"6 Bulan","b6"],
			[12,"1 Tahun","b12"],
			["x","Expired","bx"]
		];
		
		const max=Math.max(...Object.values(map),1);
		
		rows.forEach(r=> {
			const val=map[r[0]];
			const el=document.createElement("div");
			el.className="stat-row";
			el.innerHTML=`
			<div class="stat-label">${r[1]} (${val})</div>
			<div class="bar">
			<div class="bar-fill ${r[2]}" style="--w:${val/max*30}%"></div>
			</div>`;
			box.appendChild(el);
		});
	}
	</script>
	
	<script type="text/javascript">
	/* ================= RENDER ================= */
	function render() {
		const rekapBody = document.getElementById("rekapTableBody");
		const rekapData = hitungRekapKelas();
		rekapBody.innerHTML = "";
		Object.keys(rekapData).sort((a, b) => Number(a) - Number(b)).forEach(kelas => {
			rekapBody.innerHTML += `
			<tr>
				<td>Kelas ${kelas} Bulan</td>
				<td>${rekapData[kelas]}x</td>
			</tr>
			`;
		});
		
		const list=document.getElementById("list");
		list.innerHTML="";
		const key = search.value.toLowerCase();
		const f=filter.value;
		members.forEach(m=>m.ms=target(m.expired)-Date.now());
		const mode = sortMode.value;
		let sorted = [...members];
		if (mode === "active") {
			sorted.sort((a,b)=>b.ms - a.ms);
		}
		if (mode === "bentar") {
			//members.sort((a,b)=>new Date(b.expired) - new Date(a.expired));
			sorted.sort((a,b)=>a.ms - b.ms);
		}
		if (mode === "nameAZ") {
			sorted.sort((a,b)=>a.nama.localeCompare(b.nama));
		}
		if (mode === "nameZA") {
			sorted.sort((a,b)=>b.nama.localeCompare(a.nama));
		}
		
		// ====== HAPUS DUPLIKAT BERDASARKAN NAMA ======
		const seen = new Set();
		sorted = sorted.filter(m => {
			if (seen.has(m.nama)) return false;
			seen.add(m.nama);
			return true;
		});
		
		sorted.forEach((m)=> {
			const index = members.indexOf(m);
			const lm=lastMonth(m);
			if (!m.nama.toLowerCase().includes(key)) return;
			if (f==="expired" && m.ms>0) return;
			if (f!=="all" && f!=="expired" && lm!=f) return;
			const div=document.createElement("div");
			let urgentClass = "";
			const daysLeft = Math.floor(m.ms / DAY);
			if (m.ms > 0) {
				if (daysLeft <= 3) urgentClass = "h3";
				else if (daysLeft <= 7) urgentClass = "h7";
				else if (daysLeft <= 14) urgentClass = "h14";
			}
			
			div.className = "member " + kelas(lm,m.ms) + " " + urgentClass;
			div.innerHTML=`
			<b><i class='fa fa-user-circle-o'></i>&nbsp; Nama: ${m.nama}</b><br>
			<b><i class='fa fa-calendar'></i>&nbsp; Expired: ${m.expired}</b><br>
			<b><i class='fa fa-clock-o'></i>&nbsp; Sisa Waktu: <span class="countdown" data-expired="${m.expired}">${sisa(m.ms)}</span></b>
			<span class="badge">${badge(m.history)}</span>
			<div class="history">
			<i class='fa fa-phone-square'></i>&nbsp;&nbsp; Nomor: ${m.whatsapp}
			<br>
			<i class='fa fa-recycle'></i>&nbsp; Join Kelas: ${join(m.history)}
			</div>
			${isAdmin ? `
			<button class="tambah" onclick="tambahHistory(${index})">🐝 Tambah Kelas</button>
			<button class="tambah" onclick="editMember(${index})">🐱 Edit</button>
			` : ""}
			`;
			list.appendChild(div);
		});
	}
	
	function initStat() {
		members.forEach(m => m.ms = target(m.expired) - Date.now());
		const sorted = [...members].sort((a,b)=>b.ms - a.ms);
		renderStat(sorted);
	}
	
	search.oninput = render;
	filter.onchange = render;
	sortMode.onchange = render;
	initStat();
	render();
	</script>
	
	<script type="text/javascript">
	setInterval(() => {
		const countdowns = document.querySelectorAll(".countdown");
		countdowns.forEach(el => {
			const expiredDate = el.getAttribute("data-expired");
			if (!expiredDate || expiredDate === "Expired") {
				el.textContent = "Expired";
				return;
			}
			const ms = new Date(expiredDate + "T00:00:00").getTime() - Date.now();
			if (ms <= 0) {
				el.textContent = "Masa Aktif Habis";
				return;
			}
			const h = Math.floor(ms / DAY);
			const j = Math.floor(ms % DAY / HOUR);
			const m = Math.floor(ms % HOUR / MIN);
			const d = Math.floor(ms % MIN / SEC);
			el.textContent = `${h} Hari ${j} Jam ${m} Menit ${d} Detik`;
		});
	}, 1000); // 8 detik
	</script>

	<script type="text/javascript">
	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.register('/sw.js').then(reg => {
			// cek apakah sudah pernah tampilkan notif
			const swNotifShown = localStorage.getItem("swNotifShown");
			if (!swNotifShown) {
				alert("Service Worker berhasil diaktifkan 🦤");
				// simpan agar tidak muncul lagi
				localStorage.setItem("swNotifShown", "true");
			}
		}).catch(err => {
			console.log("SW Registration failed:", err);
		});
		navigator.serviceWorker.addEventListener('message', e => {
			if (e.data.type === 'check-reminder') {
				render(); // trigger reminder H-7, H-3, Expired
			}
		});
	}
	</script>
	
	<script type="text/javascript">
	function exportData() {
		const dataStr = JSON.stringify(members, null, 2);
		const blob = new Blob([dataStr], {type: "application/json"});
		const url = URL.createObjectURL(blob);
		const a = document.createElement("a");
		a.href = url;
		a.download = "backup_members.json";
		a.click();
	}
	
	function importData(event) {
		const file = event.target.files[0];
		if (!file) return;
		const reader = new FileReader();
		reader.onload = function(e) {
			const imported = JSON.parse(e.target.result);
			if (Array.isArray(imported)) {
				members.length = 0;
				imported.forEach(m => members.push(m));
				alert("Data berhasil di-import 🖨️");
				render();
			}
		};
		reader.readAsText(file);
	}
	</script>
	
	<script type="text/javascript">
		const toggleBtn = document.getElementById("themeToggle");
		function applyTheme(theme) {
			document.body.classList.add("theme-switching");
			setTimeout(() => {
				document.body.setAttribute("data-theme", theme);
				localStorage.setItem("theme", theme);
				toggleBtn.textContent = theme === "dark" ? "☀ Light Mode" : "🌙 Dark Mode";
			}, 150);
			setTimeout(() => {
				document.body.classList.remove("theme-switching");
			}, 400);
		}
		toggleBtn.onclick = () => {
			const current = document.body.getAttribute("data-theme") || "dark";
			applyTheme(current === "dark" ? "light" : "dark");
		};
		// Load saved theme
		const savedTheme = localStorage.getItem("theme");
		if (savedTheme) {
			applyTheme(savedTheme);
		} else { // optional: ikut sistem device
			const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
			applyTheme(prefersDark ? "dark" : "light");
		}
	</script>
