		<meta property="og:type" content="website">
<style>
body{
 font-family:sans-serif;
 text-align:center;
 background:#111;
 color:#fff;
 padding:20px;
}

.box{
 font-size:45px;
 margin:30px;
 font-weight:bold;
 transition:0.1s;
}

button{
 padding:12px 20px;
 font-size:16px;
 border:none;
 border-radius:8px;
 background:dodgerblue;
 color:white;
}

input{
 padding:10px;
 font-size:16px;
 border-radius:6px;
 border:none;
}

.spin{
 animation: shake 0.15s infinite;
}

@keyframes shake{
 0%{transform:translateX(0)}
 25%{transform:translateX(-4px)}
 50%{transform:translateX(4px)}
 75%{transform:translateX(-4px)}
 100%{transform:translateX(0)}
}

/* confetti */
#confetti{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 pointer-events:none;
}

/* kartu */
#card{
 display:none;
 margin-top:20px;
}

.card-box{
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 padding:20px;
 border-radius:15px;
 color:white;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.card-box h1{
 font-size:40px;
 margin:10px 0;
}
</style>

</head>

<body>

<h2>🎰 Gacha THR</h2>

<div id="form">
<input id="nama" placeholder="Masukkan nama kamu">
<br><br>
<button onclick="saveName()">Mulai</button>
</div>

<div id="game" style="display:none;">
<h3 id="welcome"></h3>

<div class="box" id="result">---</div>

<button onclick="gacha()" id="btn">🎲 Gacha</button>

<!-- kartu -->
<div id="card">
 <div class="card-box">
  <h3>🎁 THR Kamu</h3>
  <p id="cardNama"></p>
  <h1 id="cardHasil"></h1>
 </div>
</div>

</div>

<!-- canvas confetti -->
<canvas id="confetti"></canvas>

<!-- audio -->
<audio id="diceSound" src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

// ================= DATA =================
const hadiah = [
 {value:"50.000", chance:15},
 {value:"35.000", chance:15},
 {value:"30.000", chance:20},
 {value:"25.000", chance:25},
 {value:"20.000", chance:25}
];

// ================= INIT =================
const nama = localStorage.getItem("nama");
const hasil = localStorage.getItem("hasil");

if(nama){
 document.getElementById("form").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("welcome").innerText = "Halo " + nama;

 if(hasil){
  showResult(nama, hasil);
  document.getElementById("btn").disabled = true;
 }
}

// ================= SAVE NAMA =================
function saveName(){
 const n = document.getElementById("nama").value;
 if(!n) return alert("Isi nama dulu");

 localStorage.setItem("nama", n);
 location.reload();
}

// ================= RANDOM =================
function getRandomHadiah(){
 let rand = Math.random()*100;
 let sum = 0;

 for(let h of hadiah){
  sum += h.chance;
  if(rand <= sum) return h.value;
 }
}

// ================= WARNA =================
function randomColor(){
 const colors = ["#ff4d4d","#4dff4d","#4dd2ff","#ffff4d","#ff4df2","#ffa64d"];
 return colors[Math.floor(Math.random()*colors.length)];
}

// ================= CONFETTI =================
function startConfetti(){
 const canvas = document.getElementById("confetti");
 const ctx = canvas.getContext("2d");

 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;

 let pieces = [];

 for(let i=0;i<150;i++){
  pieces.push({
   x: Math.random()*canvas.width,
   y: Math.random()*canvas.height,
   size: Math.random()*8+2,
   speed: Math.random()*3+2
  });
 }

 function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  pieces.forEach(p=>{
   ctx.fillStyle = `hsl(${Math.random()*360},100%,50%)`;
   ctx.fillRect(p.x,p.y,p.size,p.size);

   p.y += p.speed;
   if(p.y > canvas.height) p.y = 0;
  });

  requestAnimationFrame(draw);
 }

 draw();

 setTimeout(()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
 },4000);
}

// ================= TAMPILKAN HASIL =================
function showResult(nama, hasil){
 document.getElementById("result").innerText = "Rp " + hasil;

 document.getElementById("message").innerText =
  "Selamat " + nama + ", THR kamu Rp. " + hasil;

 document.getElementById("card").style.display = "block";
 document.getElementById("cardNama").innerText = nama;
 document.getElementById("cardHasil").innerText = "Rp " + hasil;
}

// ================= GACHA =================
function gacha(){

 if(localStorage.getItem("hasil")){
  alert("Kamu sudah gacha!");
  return;
 }

 const box = document.getElementById("result");
 const btn = document.getElementById("btn");
 const sound = document.getElementById("diceSound");

 btn.disabled = true;
 box.classList.add("spin");

 sound.currentTime = 0;
 sound.play();

 let interval = setInterval(()=>{
  const random = hadiah[Math.floor(Math.random()*hadiah.length)];
  box.innerText = "Rp " + random.value;
  box.style.color = randomColor();
 },100);

 setTimeout(()=>{
  clearInterval(interval);

  const final = getRandomHadiah();
  const nama = localStorage.getItem("nama");

  box.classList.remove("spin");
  box.style.color = "#fff";

  showResult(nama, final);

  sound.pause();

  document.getElementById("winSound").play();
  startConfetti();

  localStorage.setItem("hasil", final);

 },7000);
}

</script>

</body>
</html>
