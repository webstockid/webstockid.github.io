<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spin THR</title>

<style>
body{
 font-family:sans-serif;
 background:#0f172a;
 color:white;
 text-align:center;
 margin:0;
 padding:20px;
}

/* container */
.container{
 max-width:350px;
 margin:auto;
}

/* pointer */
#pointer{
 width:0;
 height:0;
 border-left:12px solid transparent;
 border-right:12px solid transparent;
 border-bottom:25px solid #ef4444;
 margin:10px auto -10px auto;
 position:relative;
 z-index:2;
}

/* canvas */
#wheel{
 display:block;
 margin:auto;
}

/* button */
button{
 margin-top:20px;
 padding:12px 25px;
 border:none;
 border-radius:10px;
 background:#3b82f6;
 color:white;
 font-size:16px;
 font-weight:bold;
}

/* message */
#message{
 margin-top:15px;
 font-size:15px;
 color:#cbd5f5;
}

/* card */
#card{
 display:none;
 margin-top:20px;
}

.card-box{
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 padding:20px;
 border-radius:16px;
 box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card-box h1{
 font-size:36px;
 margin:10px 0;
}

/* confetti */
#confetti{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 pointer-events:none;
}
</style>

</head>

<body>

<div class="container">

<h2>🎡 Spin THR</h2>
<h3 id="welcome"></h3>

<div id="pointer"></div>
<canvas id="wheel" width="300" height="300"></canvas>

<button onclick="spin()" id="btn">SPIN</button>

<div id="message"></div>

<div id="card">
 <div class="card-box">
  <h3>🎁 THR Kamu</h3>
  <p id="cardNama"></p>
  <h1 id="cardHasil"></h1>
 </div>
</div>

</div>

<canvas id="confetti"></canvas>

<script>

// DATA
const items = [
 {label:"50.000", chance:15},
 {label:"35.000", chance:15},
 {label:"30.000", chance:20},
 {label:"25.000", chance:25},
 {label:"20.000", chance:25}
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
let angle = 0;

// DRAW WHEEL (FIX ALIGN TEXT)
function drawWheel(){
 const arc = (2*Math.PI)/items.length;

 items.forEach((item,i)=>{
  let start = i*arc;
  let end = start + arc;

  ctx.beginPath();
  ctx.fillStyle = `hsl(${i*70},70%,50%)`;
  ctx.moveTo(150,150);
  ctx.arc(150,150,150,start,end);
  ctx.fill();

  // TEXT TENGAH SLICE
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(start + arc/2);
  ctx.textAlign="right";
  ctx.fillStyle="#fff";
  ctx.font="bold 14px sans-serif";
  ctx.fillText(item.label,130,5);
  ctx.restore();
 });
}

drawWheel();

// RANDOM %
function getResult(){
 let r=Math.random()*100, sum=0;
 for(let i=0;i<items.length;i++){
  sum+=items[i].chance;
  if(r<=sum) return i;
 }
}

// INIT (nama auto)
let nama = localStorage.getItem("nama") || "Guest";
document.getElementById("welcome").innerText="Halo "+nama;

// SPIN
function spin(){

 if(localStorage.getItem("sudahGacha")==="true"){
  alert("Sudah spin!");
  return;
 }

 let btn = document.getElementById("btn");
 btn.disabled=true;

 let index = getResult();
 let deg = 360/items.length;

 let target = (360*5) + (index*deg);
 let start = angle;
 let end = start + target;

 let duration=7000, startTime=null;

 function animate(t){
  if(!startTime) startTime=t;
  let progress=t-startTime;

  let ease=1-Math.pow(1-progress/duration,3);

  angle = start+(end-start)*ease;

  ctx.clearRect(0,0,300,300);
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(angle*Math.PI/180);
  ctx.translate(-150,-150);
  drawWheel();
  ctx.restore();

  if(progress<duration){
   requestAnimationFrame(animate);
  }else{
   finish(index);
  }
 }

 requestAnimationFrame(animate);
}

// FINISH
function finish(index){
 let result = items[index].label;

 document.getElementById("message").innerText =
  "Selamat "+nama+", THR kamu Rp. "+result;

 document.getElementById("card").style.display="block";
 document.getElementById("cardNama").innerText=nama;
 document.getElementById("cardHasil").innerText="Rp "+result;

 startConfetti();

 localStorage.setItem("hasil",result);
 localStorage.setItem("sudahGacha","true");
}

// CONFETTI
function startConfetti(){
 let canvas=document.getElementById("confetti");
 let ctx=canvas.getContext("2d");

 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;

 let p=[];
 for(let i=0;i<100;i++){
  p.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   s:Math.random()*5+2,
   v:Math.random()*3+2
  });
 }

 function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(e=>{
   ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
   ctx.fillRect(e.x,e.y,e.s,e.s);
   e.y+=e.v;
   if(e.y>canvas.height) e.y=0;
  });
  requestAnimationFrame(draw);
 }

 draw();
 setTimeout(()=>ctx.clearRect(0,0,canvas.width,canvas.height),4000);
}

</script>

</body>
</html>
