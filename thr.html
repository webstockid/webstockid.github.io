<html xmlns="http://www.w3.org/1999/xhtml">
<!DOCTYPE html PUBLIC '-//WAPFORUM//DTD XHTML Mobile 1.0//EN' 'http://www.wapforum.org/DTD/xhtml-mobile10.dtd'>

		<title>Tunjangan THR Lebaran</title>

		<meta name="viewport" content="width=device-width, initial-scale=1, minimal-scale=1, maximal-scale=1">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

		<meta property="og:type" content="website">
<style>
body{
 font-family:sans-serif;
 text-align:center;
 background:#111;
 color:#fff;
}

canvas{
 margin-top:20px;
}

button{
 margin-top:20px;
 padding:12px 20px;
 border:none;
 border-radius:8px;
 background:dodgerblue;
 color:white;
 font-size:16px;
}

#pointer{
 width:0;
 height:0;
 border-left:15px solid transparent;
 border-right:15px solid transparent;
 border-bottom:30px solid red;
 margin:auto;
}

#card{
 display:none;
 margin-top:20px;
}

.card-box{
 background:linear-gradient(135deg,#1e3c72,#2a5298);
 padding:20px;
 border-radius:15px;
 width:250px;
 margin:auto;
}

#confetti{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 pointer-events:none;
}
</style>

</head>

<body>

<h2>🎡 Spin THR</h2>

<div id="form">
<input id="nama" placeholder="Nama kamu">
<br>
<button onclick="saveName()">Mulai</button>
</div>

<div id="game" style="display:none;">
<h3 id="welcome"></h3>

<div id="pointer"></div>
<canvas id="wheel" width="300" height="300"></canvas>

<br>
<button onclick="spin()" id="btn">SPIN</button>

<div id="message"></div>

<div id="card">
 <div class="card-box">
  <h3>🎁 THR Kamu</h3>
  <p id="cardNama"></p>
  <h1 id="cardHasil"></h1>
 </div>
</div>

</div>

<canvas id="confetti"></canvas>

<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>

// DATA
const items = [
 {label:"50.000", chance:15},
 {label:"35.000", chance:15},
 {label:"30.000", chance:20},
 {label:"25.000", chance:25},
 {label:"20.000", chance:25}
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;

// DRAW WHEEL
function drawWheel(){
 let total = items.length;
 let arc = (2*Math.PI)/total;

 items.forEach((item,i)=>{
  ctx.beginPath();
  ctx.fillStyle = `hsl(${i*70},70%,50%)`;
  ctx.moveTo(150,150);
  ctx.arc(150,150,150,i*arc,(i+1)*arc);
  ctx.fill();

  ctx.fillStyle="#fff";
  ctx.font="14px sans-serif";
  ctx.fillText(item.label,110,40 + i*40);
 });
}

drawWheel();

// RANDOM BERDASARKAN %
function getResult(){
 let r = Math.random()*100;
 let sum=0;
 for(let i=0;i<items.length;i++){
  sum+=items[i].chance;
  if(r<=sum) return i;
 }
}

// SAVE NAMA
function saveName(){
 let n = document.getElementById("nama").value;
 if(!n) return alert("Isi nama");
 localStorage.setItem("nama",n);
 location.reload();
}

// INIT
let nama = localStorage.getItem("nama");
let hasil = localStorage.getItem("hasil");
let sudah = localStorage.getItem("sudahGacha");

if(nama){
 document.getElementById("form").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("welcome").innerText="Halo "+nama;

 if(sudah==="true"){
  showResult(nama,hasil);
  document.getElementById("btn").disabled=true;
 }
}

// SPIN
function spin(){

 if(localStorage.getItem("sudahGacha")==="true"){
  alert("Sudah spin!");
  return;
 }

 let btn = document.getElementById("btn");
 let sound = document.getElementById("spinSound");

 btn.disabled=true;
 sound.play();

 let index = getResult();
 let deg = 360/items.length;

 let target = (360*5) + (index*deg);

 let start = angle;
 let end = start + target;
 let duration = 7000;
 let startTime = null;

 function animate(t){
  if(!startTime) startTime = t;
  let progress = t - startTime;

  let ease = 1 - Math.pow(1 - progress/duration,3);

  angle = start + (end-start)*ease;

  ctx.clearRect(0,0,300,300);
  ctx.save();
  ctx.translate(150,150);
  ctx.rotate(angle*Math.PI/180);
  ctx.translate(-150,-150);
  drawWheel();
  ctx.restore();

  if(progress<duration){
   requestAnimationFrame(animate);
  }else{
   finish(index);
  }
 }

 requestAnimationFrame(animate);
}

// FINISH
function finish(index){

 let result = items[index].label;
 let nama = localStorage.getItem("nama");

 showResult(nama,result);

 document.getElementById("spinSound").pause();
 document.getElementById("winSound").play();

 startConfetti();

 localStorage.setItem("hasil",result);
 localStorage.setItem("sudahGacha","true");
}

// SHOW RESULT
function showResult(nama,hasil){
 document.getElementById("message").innerText =
 "Selamat "+nama+", THR kamu Rp. "+hasil;

 document.getElementById("card").style.display="block";
 document.getElementById("cardNama").innerText=nama;
 document.getElementById("cardHasil").innerText="Rp "+hasil;
}

// CONFETTI
function startConfetti(){
 let canvas = document.getElementById("confetti");
 let ctx = canvas.getContext("2d");

 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;

 let pieces=[];
 for(let i=0;i<120;i++){
  pieces.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   size:Math.random()*6+2,
   speed:Math.random()*3+2
  });
 }

 function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces.forEach(p=>{
   ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
   ctx.fillRect(p.x,p.y,p.size,p.size);
   p.y+=p.speed;
   if(p.y>canvas.height) p.y=0;
  });
  requestAnimationFrame(draw);
 }

 draw();

 setTimeout(()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
 },4000);
}

</script>

</body>
</html>
