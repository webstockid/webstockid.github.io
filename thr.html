<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha THR - Spin Wheel</title>
    <style>
        :root {
            --primary: #e63946;
            --secondary: #f1faee;
            --accent: #a8dadc;
            --dark: #1d3557;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Form Input Nama */
        #registration-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .card {
            background: white;
            color: var(--dark);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 15px 0;
            border: 2px solid var(--accent);
            border-radius: 5px;
        }

        button {
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Wheel Styles */
        .wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 2rem;
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: gold;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        /* Result Popup (Amplop) */
        #result-popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .envelope {
            background: #d62828;
            padding: 40px;
            border-radius: 10px;
            border: 4px solid #f77f00;
            text-align: center;
            transform: scale(0.5);
            animation: popIn 0.5s forwards ease-out;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="registration-overlay">
        <div class="card">
            <h2>Siapa Namamu?</h2>
            <p>Masukkan nama untuk memutar roda THR</p>
            <input type="text" id="username" placeholder="Nama Lengkap...">
            <br>
            <button onclick="startApp()">Masuk</button>
        </div>
    </div>

    <h1>Gacha THR 🎉</h1>
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel"></canvas>
    </div>
    <button id="spin-btn" onclick="spin()">PUTAR SEKARANG!</button>

    <div id="result-popup">
        <div class="envelope">
            <h2 id="congrats-text"></h2>
            <p style="font-size: 1.2rem;">Saldo ditambahkan ke akun Anda!</p>
            <button onclick="location.reload()">Tutup</button>
        </div>
    </div>

    <audio id="spin-sound" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
    <audio id="win-sound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spin-btn');
        
        const prizes = [
            { label: '20rb', weight: 25, color: '#e63946' },
            { label: '25rb', weight: 25, color: '#f1faee' },
            { label: '30rb', weight: 20, color: '#a8dadc' },
            { label: '35rb', weight: 20, color: '#457b9d' },
            { label: '50rb', weight: 10, color: '#fca311' }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        let userName = "";

        // Cek LocalStorage saat load
        window.onload = () => {
            if(localStorage.getItem('gacha_user')) {
                showResult(localStorage.getItem('gacha_user'), localStorage.getItem('gacha_prize'), true);
            }
            drawWheel();
        };

        function startApp() {
            const input = document.getElementById('username').value;
            if(input.trim().length < 3) return alert("Masukkan nama yang valid!");
            
            userName = input;
            document.getElementById('registration-overlay').classList.add('hidden');
        }

        function drawWheel() {
            const size = 300;
            canvas.width = size;
            canvas.height = size;
            const center = size / 2;
            const sliceAngle = (2 * Math.PI) / prizes.length;

            prizes.forEach((prize, i) => {
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();

                // Text
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "#1d3557";
                ctx.font = "bold 18px Arial";
                ctx.fillText(prize.label, center / 2, 10);
                ctx.restore();
            });
        }

        function getWeightedPrize() {
            let totalWeight = prizes.reduce((sum, p) => sum + p.weight, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < prizes.length; i++) {
                if (random < prizes[i].weight) return i;
                random -= prizes[i].weight;
            }
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            
            const prizeIndex = getWeightedPrize();
            const sliceAngle = 360 / prizes.length;
            const extraSpins = 5 * 360; // 5 kali putar
            const finalAngle = extraSpins + (360 - (prizeIndex * sliceAngle)) - (sliceAngle / 2);
            
            document.getElementById('spin-sound').play();
            
            canvas.style.transition = "transform 4s cubic-bezier(0.15, 0, 0.15, 1)";
            canvas.style.transform = `rotate(${finalAngle}deg)`;

            setTimeout(() => {
                const wonPrize = prizes[prizeIndex].label;
                document.getElementById('win-sound').play();
                saveAndShow(wonPrize);
            }, 4000);
        }

        function saveAndShow(prize) {
            localStorage.setItem('gacha_user', userName);
            localStorage.setItem('gacha_prize', prize);
            showResult(userName, prize);
        }

        function showResult(name, prize, alreadyPlayed = false) {
            document.getElementById('registration-overlay').classList.add('hidden');
            const popup = document.getElementById('result-popup');
            const text = document.getElementById('congrats-text');
            
            popup.style.display = 'flex';
            if(alreadyPlayed) {
                text.innerText = `Halo ${name}, Anda sudah mengambil THR sebesar Rp. ${prize}`;
                spinBtn.disabled = true;
                spinBtn.innerText = "SUDAH PERNAH SPIN";
            } else {
                text.innerText = `Selamat ${name}, kamu mendapat thr sebesar Rp. ${prize}`;
            }
        }
    </script>
</body>
</html>
