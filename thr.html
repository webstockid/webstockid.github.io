<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gacha Nominal</title>
<style>
body{
 font-family: sans-serif;
 text-align:center;
 background:#111;
 color:#fff;
 padding:20px;
}

.box{
 font-size:40px;
 margin:30px;
}

button{
 padding:12px 20px;
 font-size:16px;
 border:none;
 border-radius:8px;
 background:dodgerblue;
 color:white;
}

input{
 padding:10px;
 font-size:16px;
 border-radius:6px;
 border:none;
 margin-top:20px;
}

.spin{
 animation: shake 0.2s infinite;
}

@keyframes shake{
 0%{transform:translateX(0)}
 25%{transform:translateX(-3px)}
 50%{transform:translateX(3px)}
 75%{transform:translateX(-3px)}
 100%{transform:translateX(0)}
}
</style>
</head>

<body>

<h2>🎰 Gacha Nominal</h2>

<div id="form">
<input id="nama" placeholder="Masukkan nama kamu">
<br><br>
<button onclick="saveName()">Mulai</button>
</div>

<div id="game" style="display:none;">
<h3 id="welcome"></h3>

<div class="box" id="result">---</div>

<button onclick="gacha()" id="btn">🎲 Gacha</button>
</div>

<script>

// ================== DATA ==================
const hadiah = [
 {value:"20.000", weight:80},
 {value:"25.000", weight:70},
 {value:"30.000", weight:50},
 {value:"35.000", weight:30},
 {value:"50.000", weight:15}
];

// ================== INIT ==================
const nama = localStorage.getItem("nama");
const hasil = localStorage.getItem("hasil");

if(nama){
 document.getElementById("form").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("welcome").innerText = "Halo " + nama;

 if(hasil){
 document.getElementById("result").innerText = "Rp " + hasil;
 document.getElementById("btn").disabled = true;
 }
}

// ================== SAVE NAMA ==================
function saveName(){
 const namaInput = document.getElementById("nama").value;
 if(!namaInput) return alert("Isi nama dulu");

 localStorage.setItem("nama", namaInput);
 location.reload();
}

// ================== WEIGHT RANDOM ==================
function weightedRandom(){
 let total = hadiah.reduce((sum,h)=>sum+h.weight,0);
 let rand = Math.random()*total;

 for(let h of hadiah){
 if(rand < h.weight) return h.value;
 rand -= h.weight;
 }
}

// ================== GACHA ==================
function gacha(){

 if(localStorage.getItem("hasil")){
 alert("Kamu sudah gacha!");
 return;
 }

 const box = document.getElementById("result");
 const btn = document.getElementById("btn");

 btn.disabled = true;
 box.classList.add("spin");

 let interval = setInterval(()=>{
 const random = hadiah[Math.floor(Math.random()*hadiah.length)];
 box.innerText = "Rp " + random.value;
 },100);

 setTimeout(()=>{
 clearInterval(interval);

 const final = weightedRandom();

 box.classList.remove("spin");
 box.innerText = "Rp " + final;

 localStorage.setItem("hasil", final);

 },7000);
}

</script>

</body>
</html>
